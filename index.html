<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Catalogue Restos Tunisie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍽️ Catalogue Restos</h1>
        <p>Commandez sur WhatsApp</p>
    </header>

    <div class="whatsapp-banner">
        📱 Livraison rapide Tunisie
        <a href="https://wa.me/21651924385">Contacter livraison ⚡</a>
    </div>

    <!-- Recherche -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Rechercher un resto ou un plat...">
    </div>

    <!-- Filtres rapides -->
    <div class="quick-filters">
        <span class="filter-btn active" data-filter="all">🍽️ Tous</span>
        <span class="filter-btn" data-filter="burger">🍔 Burgers</span>
        <span class="filter-btn" data-filter="oriental">🥙 Oriental</span>
        <span class="filter-btn" data-filter="poisson">🐟 Poisson</span>
        <span class="filter-btn" data-filter="pizza">🍕 Pizza</span>
        <span class="filter-btn" data-filter="promo">🔥 Promos</span>
    </div>

    <div class="container" id="restoContainer">
        <!-- Les restaurants seront chargés ici dynamiquement -->
    </div>

    <!-- Contact direct -->
    <div class="contact-direct">
        <h3>🚚 Livraison</h3>
        <p>Contactez le responsable</p>
        <a href="https://wa.me/21651924385" class="btn-whatsapp-large">
            📱 WhatsApp Direct
        </a>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="#" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Accueil</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-search"></i>
            <span>Recherche</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-heart"></i>
            <span>Favoris</span>
        </a>
        <a href="#" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Compte</span>
        </a>
    </div>

    <!-- Scroll to top -->
    <div class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script src="script.js"></script>
</body>
</html>
